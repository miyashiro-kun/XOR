<!DOCTYPE html>
<html>
<head>
  <title>Enkripsi XOR</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #cfe9ff, #a5d8ff, #d6ecff, #eaf4ff);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 25px;
      width: 360px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      text-align: center;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h2 {
      margin-bottom: 20px;
      color: #2c3e50;
    }

    textarea, input {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      border: none;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.8);
      outline: none;
      transition: 0.3s;
      font-size: 14px;
    }

    textarea {
      height: 90px;
      resize: none;
    }

    textarea:focus, input:focus {
      box-shadow: 0 0 10px #74c0fc;
      transform: scale(1.02);
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #74c0fc, #a5d8ff);
      font-weight: bold;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    /* Ripple effect */
    button:after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
    }

    button:active:after {
      width: 200px;
      height: 200px;
      opacity: 1;
      transition: 0.4s;
    }

    .label {
      margin-top: 15px;
      font-weight: bold;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      background: #2c3e50;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      transition: 0.4s;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(-10px);
    }

  </style>
</head>
<body>

<div class="card">
  <h2>🔐 XOR Cipher</h2>

  <textarea id="text" placeholder="Masukkan teks"></textarea>
  <input id="key" placeholder="Kunci rahasia">

  <div class="btn-group">
    <button onclick="encrypt()">Enkripsi</button>
    <button onclick="decrypt()">Dekripsi</button>
  </div>

  <div class="label">Hasil</div>
  <textarea id="result"></textarea>

  <button onclick="copyResult()">Copy</button>
</div>

<div id="toast" class="toast">Disalin!</div>

<script>
function xorProcess(text, key) {
  let result = '';
  for (let i = 0; i < text.length; i++) {
    let charCode = text.charCodeAt(i);
    let keyCode = key.charCodeAt(i % key.length);
    result += String.fromCharCode(charCode ^ keyCode);
  }
  return result;
}

function encrypt() {
  let text = document.getElementById("text").value;
  let key = document.getElementById("key").value;
  let encrypted = xorProcess(text, key);
  document.getElementById("result").value = btoa(encrypted);
}

function decrypt() {
  let text = document.getElementById("text").value;
  let key = document.getElementById("key").value;
  let decoded = atob(text);
  document.getElementById("result").value = xorProcess(decoded, key);
}

function copyResult() {
  let result = document.getElementById("result");
  result.select();
  document.execCommand("copy");

  let toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1500);
}
</script>

</body>
</html>
